<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Space+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0a0a0f;
        --accent: #e8d5a3;
        --soft: #c4a882;
        --dim: #3a3830;
      }

      body {
        background: var(--bg);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        font-family: "Space Mono", monospace;
      }

      /* Animated grain overlay */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
        opacity: 0.18;
        pointer-events: none;
        z-index: 10;
        animation: grain 0.4s steps(1) infinite;
      }

      @keyframes grain {
        0%,
        100% {
          transform: translate(0, 0);
        }
        10% {
          transform: translate(-2%, -2%);
        }
        20% {
          transform: translate(2%, -1%);
        }
        30% {
          transform: translate(-1%, 2%);
        }
        40% {
          transform: translate(2%, 1%);
        }
        50% {
          transform: translate(-1%, -2%);
        }
        60% {
          transform: translate(1%, 2%);
        }
        70% {
          transform: translate(-2%, 1%);
        }
        80% {
          transform: translate(2%, -2%);
        }
        90% {
          transform: translate(-1%, 1%);
        }
      }

      /* Radial glow behind text */
      .glow {
        position: fixed;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(232, 213, 163, 0.07) 0%,
          transparent 70%
        );
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        animation: pulse 4s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.6;
          transform: translate(-50%, -50%) scale(1);
        }
        50% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1.12);
        }
      }

      /* Floating particles */
      .particles {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }
      .particle {
        position: absolute;
        width: 2px;
        height: 2px;
        border-radius: 50%;
        background: var(--accent);
        opacity: 0;
        animation: float linear infinite;
      }

      @keyframes float {
        0% {
          opacity: 0;
          transform: translateY(100vh) scale(0);
        }
        10% {
          opacity: 0.6;
        }
        90% {
          opacity: 0.3;
        }
        100% {
          opacity: 0;
          transform: translateY(-10vh) scale(1.5);
        }
      }

      /* Decorative lines */
      .line-top,
      .line-bottom {
        position: fixed;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--dim),
          transparent
        );
        width: 60%;
        left: 20%;
      }
      .line-top {
        top: 25%;
        animation: line-in 1.8s ease forwards;
        transform: scaleX(0);
      }
      .line-bottom {
        bottom: 25%;
        animation: line-in 1.8s ease 0.3s forwards;
        transform: scaleX(0);
      }

      @keyframes line-in {
        to {
          transform: scaleX(1);
        }
      }

      /* Main stage */
      .stage {
        position: relative;
        z-index: 5;
        text-align: center;
        padding: 3rem;
      }

      /* Label above */
      .label {
        font-family: "Space Mono", monospace;
        font-size: 11px;
        letter-spacing: 0.35em;
        color: var(--soft);
        text-transform: uppercase;
        opacity: 0;
        animation: fade-up 1s ease 0.5s forwards;
      }

      /* Main heading */
      .headline {
        font-family: "Playfair Display", serif;
        font-size: clamp(4rem, 12vw, 9rem);
        font-weight: 700;
        color: var(--accent);
        line-height: 1;
        display: flex;
        gap: 0.08em;
        overflow: hidden;
        margin: 1rem 0;
      }
    f
      .headline span {
        display: inline-block;
        opacity: 0;
        transform: translateY(110%);
        animation: letter-rise 0.7s cubic-bezier(0.22, 0.68, 0, 1.2) forwards;
      }

      /* Sub line */
      .sub {
        font-size: 12px;
        letter-spacing: 0.2em;
        color: var(--dim);
        text-transform: uppercase;
        opacity: 0;
        animation: fade-up 1s ease 1.8s forwards;
      }

      /* Cursor blink after text */
      .cursor {
        display: inline-block;
        width: 3px;
        height: 0.75em;
        background: var(--accent);
        margin-left: 6px;
        vertical-align: middle;
        animation: blink 1s step-end infinite;
        opacity: 0;
        animation-delay: 2.2s;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      @keyframes letter-rise {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fade-up {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Corner decorations */
      .corner {
        position: fixed;
        width: 40px;
        height: 40px;
        border-color: var(--dim);
        border-style: solid;
        opacity: 0;
        animation: fade-up 1s ease 1.2s forwards;
      }
      .corner.tl {
        top: 20px;
        left: 20px;
        border-width: 1px 0 0 1px;
      }
      .corner.tr {
        top: 20px;
        right: 20px;
        border-width: 1px 1px 0 0;
      }
      .corner.bl {
        bottom: 20px;
        left: 20px;
        border-width: 0 0 1px 1px;
      }
      .corner.br {
        bottom: 20px;
        right: 20px;
        border-width: 0 1px 1px 0;
      }
    </style>
  </head>
  <body>
    <div class="glow"></div>
    <div class="line-top"></div>
    <div class="line-bottom"></div>

    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <!-- Floating particles -->
    <div class="particles" id="particles"></div>

    <div class="stage">
      <p class="label">A message for you</p>

      <h1 class="headline" id="headline"></h1>

      <p class="sub">— from the web —<span class="cursor"></span></p>
    </div>

    <script>
      // Build animated letters
      const text = "CHurpi , World!";
      const headline = document.getElementById("headline");
      text.split("").forEach((char, i) => {
        const span = document.createElement("span");
        span.textContent = char === " " ? "\u00A0" : char;
        span.style.animationDelay = 0.8 + i * 0.06 + "s";
        headline.appendChild(span);
      });

      // Generate particles
      const container = document.getElementById("particles");
      for (let i = 0; i < 30; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        p.style.left = Math.random() * 100 + "%";
        p.style.animationDuration = 6 + Math.random() * 12 + "s";
        p.style.animationDelay = Math.random() * 10 + "s";
        p.style.width = p.style.height = 1 + Math.random() * 2 + "px";
        container.appendChild(p);
      }
    </script>
  </body>
</html>
